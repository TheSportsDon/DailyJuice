<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFECB3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE082;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="800" fill="url(#heroBg)"/>
  
  <!-- Orange slices -->
  <circle cx="200" cy="200" r="60" fill="#FF6F00"/>
  <circle cx="200" cy="200" r="50" fill="#FF8F00"/>
  <circle cx="200" cy="200" r="10" fill="#FFC107"/>
  
  <circle cx="600" cy="300" r="80" fill="#FF6F00"/>
  <circle cx="600" cy="300" r="65" fill="#FF8F00"/>
  <circle cx="600" cy="300" r="15" fill="#FFC107"/>
  
  <!-- Strawberries -->
  <ellipse cx="400" cy="150" rx="50" ry="60" fill="#F44336"/>
  <circle cx="400" cy="90" r="15" fill="#4CAF50"/>
  <circle cx="390" cy="100" r="15" fill="#4CAF50"/>
  <circle cx="410" cy="100" r="15" fill="#4CAF50"/>
  
  <ellipse cx="650" cy="500" rx="70" ry="80" fill="#F44336"/>
  <circle cx="650" cy="420" r="20" fill="#4CAF50"/>
  <circle cx="635" cy="435" r="20" fill="#4CAF50"/>
  <circle cx="665" cy="435" r="20" fill="#4CAF50"/>
  
  <!-- Blueberries -->
  <circle cx="150" cy="400" r="40" fill="#3F51B5"/>
  <circle cx="140" cy="390" r="8" fill="#FFFFFF" opacity="0.6"/>
  
  <circle cx="300" cy="500" r="35" fill="#3F51B5"/>
  <circle cx="290" cy="490" r="7" fill="#FFFFFF" opacity="0.6"/>
  
  <circle cx="500" cy="600" r="45" fill="#3F51B5"/>
  <circle cx="490" cy="590" r="9" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Banana -->
  <path d="M100 600 Q150 550 200 580 Q220 590 210 610 Q160 640 110 630 Q80 620 100 600" fill="#FFC107"/>
  
  <!-- Kiwi slices -->
  <ellipse cx="550" cy="200" rx="70" ry="50" fill="#8BC34A"/>
  <ellipse cx="550" cy="200" rx="50" ry="35" fill="#CDDC39"/>
  <circle cx="540" cy="195" r="3" fill="#3E2723"/>
  <circle cx="560" cy="190" r="3" fill="#3E2723"/>
  <circle cx="570" cy="205" r="3" fill="#3E2723"/>
  <circle cx="530" cy="210" r="3" fill="#3E2723"/>
  
  <!-- Watermelon slice -->
  <path d="M650 600 L750 600 A50 50 0 0 1 700 650 Z" fill="#F44336"/>
  <path d="M660 610 L740 610 A40 40 0 0 1 700 645 Z" fill="#FFCDD2"/>
  <circle cx="680" cy="620" r="3" fill="#3E2723"/>
  <circle cx="700" cy="625" r="3" fill="#3E2723"/>
  <circle cx="720" cy="620" r="3" fill="#3E2723"/>
  
  <!-- Pineapple -->
  <ellipse cx="350" cy="350" rx="60" ry="80" fill="#FFC107"/>
  <path d="M350 270 L330 240 L350 260 L370 240 L350 270" fill="#4CAF50"/>
  <line x1="340" y1="300" x2="360" y2="320" stroke="#F57F17" stroke-width="2"/>
  <line x1="330" y1="330" x2="370" y2="350" stroke="#F57F17" stroke-width="2"/>
  <line x1="340" y1="360" x2="360" y2="380" stroke="#F57F17" stroke-width="2"/>
  
  <!-- Leaves -->
  <ellipse cx="250" cy="300" rx="40" ry="15" fill="#4CAF50" transform="rotate(45 250 300)"/>
  <ellipse cx="450" cy="400" rx="50" ry="18" fill="#4CAF50" transform="rotate(-30 450 400)"/>
  <ellipse cx="550" cy="450" rx="45" ry="16" fill="#4CAF50" transform="rotate(60 550 450)"/>
  
  <!-- Juice splashes -->
  <circle cx="100" cy="100" r="15" fill="#FF6F00" opacity="0.6"/>
  <circle cx="700" cy="150" r="20" fill="#FFC107" opacity="0.6"/>
  <circle cx="750" cy="700" r="18" fill="#F44336" opacity="0.6"/>
  <circle cx="50" cy="650" r="12" fill="#4CAF50" opacity="0.6"/>
</svg>
