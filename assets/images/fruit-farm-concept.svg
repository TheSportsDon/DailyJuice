<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#E8F5E9"/>
  
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F7FA;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="250" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="500" cy="80" r="50" fill="#FFC107" opacity="0.8"/>
  <circle cx="500" cy="80" r="40" fill="#FFB300" opacity="0.6"/>
  
  <!-- Hills -->
  <ellipse cx="300" cy="300" rx="400" ry="150" fill="#81C784"/>
  <ellipse cx="100" cy="320" rx="300" ry="120" fill="#66BB6A"/>
  <ellipse cx="500" cy="310" rx="350" ry="130" fill="#4CAF50"/>
  
  <!-- Fruit trees (representing community farm) -->
  <!-- Tree 1 -->
  <rect x="150" y="220" width="30" height="80" fill="#795548"/>
  <circle cx="165" cy="200" r="50" fill="#4CAF50"/>
  <circle cx="150" cy="190" r="40" fill="#66BB6A"/>
  <circle cx="180" cy="195" r="40" fill="#388E3C"/>
  <!-- Fruits on tree 1 -->
  <circle cx="160" cy="195" r="8" fill="#FF6F00"/>
  <circle cx="175" cy="205" r="8" fill="#FF6F00"/>
  <circle cx="155" cy="210" r="8" fill="#F44336"/>
  
  <!-- Tree 2 -->
  <rect x="350" y="230" width="35" height="75" fill="#795548"/>
  <circle cx="368" cy="210" r="55" fill="#4CAF50"/>
  <circle cx="350" cy="200" r="45" fill="#66BB6A"/>
  <circle cx="385" cy="205" r="45" fill="#388E3C"/>
  <!-- Fruits on tree 2 -->
  <circle cx="365" cy="205" r="9" fill="#FFC107"/>
  <circle cx="380" cy="215" r="9" fill="#FF6F00"/>
  <circle cx="355" cy="220" r="9" fill="#F44336"/>
  <circle cx="375" cy="195" r="9" fill="#FFC107"/>
  
  <!-- Tree 3 -->
  <rect x="500" y="240" width="28" height="70" fill="#795548"/>
  <circle cx="514" cy="220" r="45" fill="#4CAF50"/>
  <circle cx="500" cy="210" r="38" fill="#66BB6A"/>
  <circle cx="525" cy="215" r="38" fill="#388E3C"/>
  <!-- Fruits on tree 3 -->
  <circle cx="510" cy="215" r="7" fill="#FF6F00"/>
  <circle cx="520" cy="225" r="7" fill="#F44336"/>
  
  <!-- Community members (stylized figures) -->
  <circle cx="200" cy="310" r="15" fill="#FF6F00"/>
  <rect x="190" y="325" width="20" height="30" fill="#FF6F00"/>
  
  <circle cx="240" cy="315" r="15" fill="#4CAF50"/>
  <rect x="230" y="330" width="20" height="30" fill="#4CAF50"/>
  
  <circle cx="400" cy="320" r="15" fill="#F44336"/>
  <rect x="390" y="335" width="20" height="30" fill="#F44336"/>
  
  <circle cx="440" cy="318" r="15" fill="#FFC107"/>
  <rect x="430" y="333" width="20" height="30" fill="#FFC107"/>
  
  <!-- Harvest baskets -->
  <ellipse cx="280" cy="340" rx="25" ry="15" fill="#8D6E63"/>
  <ellipse cx="480" cy="345" rx="25" ry="15" fill="#8D6E63"/>
  
  <!-- Path -->
  <path d="M100 350 Q300 340 500 350" stroke="#BCAAA4" stroke-width="40" fill="none" stroke-linecap="round"/>
  
  <!-- Text placeholder area -->
  <text x="300" y="390" font-family="Arial, sans-serif" font-size="14" fill="#757575" text-anchor="middle">Community Fruit Farm Concept</text>
</svg>
