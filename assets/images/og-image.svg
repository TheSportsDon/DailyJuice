<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="ogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6F00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8F00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="1100" cy="530" r="100" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="900" cy="150" r="60" fill="#FFFFFF" opacity="0.15"/>
  
  <!-- Large juice drop logo in center -->
  <path d="M600 150 C600 150 480 300 480 380 C480 450 540 510 600 510 C660 510 720 450 720 380 C720 300 600 150 600 150 Z" fill="#FFC107"/>
  <ellipse cx="580" cy="360" rx="30" ry="50" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- Main headline -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="middle">DAILY JUICE</text>
  
  <!-- Tagline -->
  <text x="600" y="610" font-family="Arial, sans-serif" font-weight="400" font-size="24" fill="#FFFFFF" text-anchor="middle">Everybody has juice. Let's hear what you're sipping on.</text>
  
  <!-- Fruits around edges -->
  <!-- Orange top left -->
  <circle cx="150" cy="120" r="50" fill="#FF6F00"/>
  <circle cx="150" cy="120" r="40" fill="#FF8F00"/>
  
  <!-- Strawberry top right -->
  <ellipse cx="1050" cy="100" rx="45" ry="55" fill="#F44336"/>
  <circle cx="1050" cy="55" r="15" fill="#4CAF50"/>
  <circle cx="1040" cy="65" r="15" fill="#4CAF50"/>
  <circle cx="1060" cy="65" r="15" fill="#4CAF50"/>
  
  <!-- Blueberry bottom left -->
  <circle cx="120" cy="550" r="40" fill="#3F51B5"/>
  <circle cx="110" cy="540" r="8" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Kiwi bottom right -->
  <ellipse cx="1080" cy="540" rx="60" ry="45" fill="#8BC34A"/>
  <ellipse cx="1080" cy="540" rx="40" ry="30" fill="#CDDC39"/>
  <circle cx="1070" cy="535" r="3" fill="#3E2723"/>
  <circle cx="1090" cy="530" r="3" fill="#3E2723"/>
  <circle cx="1100" cy="550" r="3" fill="#3E2723"/>
  
  <!-- Additional decorative elements -->
  <circle cx="200" cy="300" r="15" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="1000" cy="400" r="20" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="300" cy="500" r="12" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="850" cy="250" r="18" fill="#FFFFFF" opacity="0.25"/>
  
  <!-- CTA at bottom -->
  <rect x="350" y="650" width="500" height="80" rx="40" fill="#FFFFFF" opacity="0.2"/>
  <text x="600" y="700" font-family="Arial, sans-serif" font-weight="700" font-size="32" fill="#FFFFFF" text-anchor="middle">Join Now – R20/month</text>
</svg>
