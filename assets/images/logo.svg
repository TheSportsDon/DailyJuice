  </defs>
  
  <!-- Juice drop icon -->
  <path d="M25 5 C25 5 10 25 10 35 C10 42 16 48 25 48 C34 48 40 42 40 35 C40 25 25 5 25 5 Z" fill="url(#logoGradient)"/>
  
